<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="favicon.png" type="image/png">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{margin:0;background:#ede0cc;}
a{color:inherit;text-decoration:none;}
</style>
</helmet>

<div style="min-height:100vh;display:flex;justify-content:center;font-family:'M PLUS Rounded 1c','Noto Sans JP',sans-serif;color:#2d2a26;">
<div style="width:100%;max-width:430px;background:#fdf3e7;position:relative;overflow:hidden;box-shadow:0 0 50px rgba(80,50,20,.10);min-height:100vh;display:flex;flex-direction:column;">

  <!-- Header bar -->
  <div style="display:flex;align-items:center;gap:14px;padding:16px 20px;background:#fffdf8;box-shadow:0 2px 10px rgba(180,130,70,.08);position:sticky;top:0;z-index:10;">
    <a href="index.html" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:#f1f7e9;color:#2a9e46;flex:none;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <img src="assets/kv/logo-official.png" alt="イークオリティ くらしサポート" style="height:34px;width:auto;display:block;">
  </div>

  <!-- Page heading -->
  <div style="padding:38px 28px 8px;text-align:center;">
    <div style="font-family:'M PLUS Rounded 1c',sans-serif;font-weight:900;font-size:13px;letter-spacing:0.34em;color:#EF6C1F;padding-left:0.34em;">COMPANY</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px;">
      <span style="width:26px;height:3px;border-radius:2px;background:#9cd07a;"></span>
      <h1 style="margin:0;font-weight:900;font-size:26px;letter-spacing:0.04em;">会社概要</h1>
      <span style="width:26px;height:3px;border-radius:2px;background:#9cd07a;"></span>
    </div>
  </div>

  <!-- Info card -->
  <div style="padding:22px 22px 40px;">
    <div style="background:#fffdf8;border-radius:18px;overflow:hidden;box-shadow:0 4px 16px rgba(180,130,70,.10);">

      <sc-for list="{{ rows }}" as="row" hint-placeholder-count="5">
        <div style="display:flex;align-items:stretch;border-bottom:1px solid #f0e6d6;">
          <div style="flex:none;width:36%;background:#f6faf0;padding:18px 16px;font-weight:800;font-size:14px;color:#2a7d3e;display:flex;align-items:center;line-height:1.4;">{{ row.label }}</div>
          <div style="flex:1;padding:18px 18px;font-weight:500;font-size:15px;line-height:1.7;white-space:pre-line;">{{ row.value }}</div>
        </div>
      </sc-for>

    </div>

    <a href="index.html" style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:28px;background:#2a9e46;color:#fff;font-weight:800;font-size:15px;border-radius:999px;padding:15px;box-shadow:0 6px 16px rgba(42,158,70,.28);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      トップに戻る
    </a>
  </div>

  <!-- Footer -->
  <div style="margin-top:auto;padding:20px;text-align:center;font-size:11px;color:#8a8175;background:#fffdf8;">© e-quality Co., Ltd. All Rights Reserved.</div>

</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      rows: [
        { label: "運営会社", value: "株式会社新生活ポータル" },
        { label: "本社所在地", value: "〒170-0013\n東京都豊島区東池袋1-18-1\nHareza Tower 12F" },
        { label: "営業時間", value: "9:00〜21:00\nWEBでの受付は24時間年中無休" },
        { label: "業務内容", value: "カーテンサブスク事業\nライフサポート事業" },
      ],
    };
  }
}
</script>
</body>
</html>
