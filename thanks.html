<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="favicon.png" type="image/png">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{margin:0;background:#ede0cc;}
a{color:inherit;text-decoration:none;}
@keyframes popIn{0%{transform:scale(0.4);opacity:0;}60%{transform:scale(1.08);}100%{transform:scale(1);opacity:1;}}
@keyframes drawCheck{to{stroke-dashoffset:0;}}
</style>
</helmet>

<div style="min-height:100vh;display:flex;justify-content:center;font-family:'M PLUS Rounded 1c','Noto Sans JP',sans-serif;color:#2d2a26;">
<div style="width:100%;max-width:430px;background:#fdf3e7;position:relative;overflow:hidden;box-shadow:0 0 50px rgba(80,50,20,.10);min-height:100vh;display:flex;flex-direction:column;">

  <!-- Header bar -->
  <div style="display:flex;align-items:center;gap:14px;padding:16px 20px;background:#fffdf8;box-shadow:0 2px 10px rgba(180,130,70,.08);">
    <img src="assets/kv/logo-official.png" alt="イークオリティ くらしサポート" style="height:34px;width:auto;display:block;">
  </div>

  <!-- Body -->
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 30px 40px;">

    <!-- Check circle -->
    <div style="width:104px;height:104px;border-radius:50%;background:#2a9e46;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 28px rgba(20,110,45,.34);animation:popIn .5s cubic-bezier(.2,.8,.3,1.2) both;">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="stroke-dasharray:30;stroke-dashoffset:30;animation:drawCheck .5s .35s ease forwards;"><path d="M4 12.5l5 5 11-11"/></svg>
    </div>

    <div style="font-family:'M PLUS Rounded 1c',sans-serif;font-weight:900;font-size:12.5px;letter-spacing:0.28em;color:#EF6C1F;padding-left:0.28em;margin-top:28px;">THANK YOU</div>

    <h1 style="margin:12px 0 0;font-weight:900;font-size:26px;line-height:1.4;letter-spacing:0.02em;">送信が完了しました</h1>

    <p style="margin:18px 0 0;font-size:14.5px;line-height:2;font-weight:500;color:#5d564c;">
      お問い合わせいただき、<br>誠にありがとうございます。<br>
      入力内容を確認のうえ、<br>担当者より順次ご連絡いたします。
    </p>

    <!-- Back button -->
    <a href="index.html" style="margin-top:32px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(180deg,#36a44e,#1c8a39);color:#fff;font-weight:900;font-size:16px;border-radius:999px;padding:16px;box-shadow:0 6px 0 #0f6e2b,0 12px 22px rgba(20,110,45,.26);">
      トップページに戻る
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>

  </div>

  <!-- Footer -->
  <div style="margin-top:auto;padding:20px;text-align:center;font-size:11px;color:#8a8175;background:#fffdf8;">© e-quality Co., Ltd. All Rights Reserved.</div>

</div>
</div>
</x-dc>
</body>
</html>
