<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{margin:0;background:#ede0cc;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;}
input{font-family:inherit;}
input::placeholder{color:#bcb1a0;}
input[type=text]:focus,input[type=tel]:focus,input[type=email]:focus{outline:none;border-color:#2a9e46;box-shadow:0 0 0 3px rgba(42,158,70,.15);}
.svc-chip input{position:absolute;opacity:0;width:0;height:0;}
.svc-box{width:22px;height:22px;border:2px solid #cbbfad;border-radius:6px;background:#fff;flex:none;position:relative;}
.svc-chip input:checked ~ .svc-wrap .svc-box{background:#2a9e46;border-color:#2a9e46;}
.svc-chip input:checked ~ .svc-wrap .svc-box:after{content:"";position:absolute;left:6px;top:2px;width:6px;height:11px;border:solid #fff;border-width:0 3px 3px 0;transform:rotate(45deg);}
.svc-chip input:checked ~ .svc-wrap{border-color:#2a9e46;background:#eef6e8;}
</style>
</helmet>

<div style="min-height:100vh;display:flex;justify-content:center;font-family:'M PLUS Rounded 1c','Noto Sans JP',sans-serif;color:#2d2a26;">
<div style="width:100%;max-width:430px;background:#fdf3e7;position:relative;overflow:hidden;box-shadow:0 0 50px rgba(80,50,20,.10);min-height:100vh;">

<div style="position:absolute;top:-30px;left:-40px;width:170px;height:150px;background:radial-gradient(circle at 38% 38%,#F9B062,#F0902F);border-radius:58% 42% 60% 40%/55% 50% 50% 45%;opacity:.5;"></div>
<div style="position:absolute;top:-26px;right:-30px;width:130px;height:130px;background:radial-gradient(circle,#FBC079,#F4A03E);border-radius:50%;opacity:.42;"></div>

<section data-screen-label="フォーム" style="position:relative;z-index:2;padding:20px 20px 40px;">

  <div style="display:flex;align-items:center;justify-content:space-between;">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:5px;color:#7a7263;font-size:13px;font-weight:700;background:#fff;border-radius:12px;padding:7px 12px;box-shadow:0 2px 6px rgba(180,130,70,.12);">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>トップに戻る
    </a>
    <div style="background:#fff;border:2.5px solid #F6A24E;border-radius:13px;padding:6px 12px;box-shadow:inset 0 0 0 2px #fff,0 3px 7px rgba(210,130,50,.18);"><span style="color:#EF6C1F;font-weight:900;font-size:15px;letter-spacing:1.5px;">相談無料</span></div>
  </div>

  <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:18px;">
    <svg width="40" height="52" viewBox="0 0 26 34" fill="none" stroke="#F4A02A" stroke-width="3" stroke-linecap="round"><path d="M24 24 L6 10"/></svg>
    <h1 style="margin:0;text-align:center;font-size:33px;line-height:1.2;font-weight:900;text-shadow:-3px -3px 0 #fff,3px -3px 0 #fff,-3px 3px 0 #fff,3px 3px 0 #fff,0 -4px 0 #fff,0 4px 0 #fff,-4px 0 0 #fff,4px 0 0 #fff,0 5px 5px rgba(150,100,50,.20);">お問い合わせ<br>フォーム</h1>
    <svg width="40" height="52" viewBox="0 0 26 34" fill="none" stroke="#F4A02A" stroke-width="3" stroke-linecap="round" style="transform:scaleX(-1);"><path d="M24 24 L6 10"/></svg>
  </div>
  <p style="text-align:center;margin:10px 0 22px;color:#1f8a3c;font-size:15px;font-weight:800;">くらしのサービスをまとめてご相談いただけます</p>

  <sc-if value="{{ submitted }}" hint-placeholder-val="{{ false }}">
    <div style="background:#fffdf8;border:1.5px solid #f1e6d4;border-radius:22px;padding:40px 24px;text-align:center;box-shadow:0 8px 20px rgba(180,130,70,.12);">
      <div style="width:74px;height:74px;border-radius:50%;background:#2a9e46;display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 6px 14px rgba(20,110,45,.3);"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <div style="font-size:24px;font-weight:900;margin-top:18px;">送信が完了しました</div>
      <p style="font-size:14.5px;color:#5d564c;line-height:1.8;margin:12px 0 24px;">お問い合わせありがとうございます。<br>入力内容を確認のうえ、担当者より<br>ご連絡いたします。</p>
      <a href="index.html"><div style="background:linear-gradient(180deg,#36a44e,#1c8a39);border-radius:26px;padding:15px;color:#fff;font-weight:900;font-size:17px;box-shadow:0 6px 0 #0f6e2b;">トップページに戻る</div></a>
    </div>
  </sc-if>

  <sc-if value="{{ notSubmitted }}" hint-placeholder-val="{{ true }}">
  <form onSubmit="{{ onSubmit }}">
    <div style="background:#fffdf8;border:1.5px solid #f1e6d4;border-radius:22px;padding:22px 18px;box-shadow:0 8px 20px rgba(180,130,70,.10);">

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:6px;width:140px;flex:none;"><span style="font-weight:900;font-size:16px;">氏名</span><span style="background:#2a9e46;color:#fff;font-size:11px;font-weight:800;border-radius:6px;padding:3px 7px;">必須</span></div>
        <input type="text" name="氏名" required placeholder="例）山田 太郎" style="flex:1;min-width:0;background:#fff;border:1.5px solid #e3d6c1;border-radius:12px;padding:12px 14px;font-size:15px;">
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:6px;width:140px;flex:none;"><span style="font-weight:900;font-size:16px;">電話番号</span><span style="background:#2a9e46;color:#fff;font-size:11px;font-weight:800;border-radius:6px;padding:3px 7px;">必須</span></div>
        <input type="tel" name="電話番号" required placeholder="例）090-1234-5678" style="flex:1;min-width:0;background:#fff;border:1.5px solid #e3d6c1;border-radius:12px;padding:12px 14px;font-size:15px;">
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:6px;width:140px;flex:none;"><span style="font-weight:900;font-size:13px;white-space:nowrap;">メールアドレス</span><span style="background:#2a9e46;color:#fff;font-size:11px;font-weight:800;border-radius:6px;padding:3px 7px;">必須</span></div>
        <input type="email" name="メールアドレス" required placeholder="例）sample@example.com" style="flex:1;min-width:0;background:#fff;border:1.5px solid #e3d6c1;border-radius:12px;padding:12px 14px;font-size:15px;">
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
        <div style="display:flex;align-items:center;gap:6px;width:140px;flex:none;"><span style="font-weight:900;font-size:16px;">住所</span><span style="background:#2a9e46;color:#fff;font-size:11px;font-weight:800;border-radius:6px;padding:3px 7px;">必須</span></div>
        <input type="text" name="住所" required placeholder="例）東京都新宿区〇〇1-2-3" style="flex:1;min-width:0;background:#fff;border:1.5px solid #e3d6c1;border-radius:12px;padding:12px 14px;font-size:15px;">
      </div>

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <span style="font-weight:900;font-size:16px;">興味のあるサービス</span><span style="background:#2a9e46;color:#fff;font-size:11px;font-weight:800;border-radius:6px;padding:3px 7px;">必須</span>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <label class="svc-chip" style="position:relative;cursor:pointer;">
          <input type="checkbox" name="service" value="電気">
          <div class="svc-wrap" style="display:flex;align-items:center;gap:9px;border:1.5px solid #e3d6c1;border-radius:12px;padding:12px 12px;background:#fff;">
            <span class="svc-box"></span>
            <span style="color:#2e9e45;display:inline-flex;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.1 14c.2-1 .65-1.75 1.4-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.75.75 1.2 1.5 1.4 2.5"/></svg></span>
            <span style="font-weight:800;font-size:15px;">電気</span>
          </div>
        </label>
        <label class="svc-chip" style="position:relative;cursor:pointer;">
          <input type="checkbox" name="service" value="ガス">
          <div class="svc-wrap" style="display:flex;align-items:center;gap:9px;border:1.5px solid #e3d6c1;border-radius:12px;padding:12px 12px;background:#fff;">
            <span class="svc-box"></span>
            <span style="color:#2e9e45;display:inline-flex;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.4-.5-2-1-3-1.07-2.14-.22-4.05 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.15.43-2.3 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></span>
            <span style="font-weight:800;font-size:15px;">ガス</span>
          </div>
        </label>
        <label class="svc-chip" style="position:relative;cursor:pointer;">
          <input type="checkbox" name="service" value="ネット回線">
          <div class="svc-wrap" style="display:flex;align-items:center;gap:9px;border:1.5px solid #e3d6c1;border-radius:12px;padding:12px 12px;background:#fff;">
            <span class="svc-box"></span>
            <span style="color:#2e9e45;display:inline-flex;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13a10 10 0 0 1 14 0"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.8a15 15 0 0 1 20 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg></span>
            <span style="font-weight:800;font-size:15px;">ネット回線</span>
          </div>
        </label>
        <label class="svc-chip" style="position:relative;cursor:pointer;">
          <input type="checkbox" name="service" value="太陽光">
          <div class="svc-wrap" style="display:flex;align-items:center;gap:9px;border:1.5px solid #e3d6c1;border-radius:12px;padding:12px 12px;background:#fff;">
            <span class="svc-box"></span>
            <span style="color:#2e9e45;display:inline-flex;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3"/><path d="M12 2v1M6.7 5.7l.7.7M16.6 5.7l-.7.7M4.5 11h1M18.5 11h1"/><path d="M5 17h14l-1.5 4h-11z"/></svg></span>
            <span style="font-weight:800;font-size:15px;">太陽光</span>
          </div>
        </label>
        <label class="svc-chip" style="position:relative;cursor:pointer;grid-column:1 / span 2;">
          <input type="checkbox" name="service" value="ウォーターサーバー">
          <div class="svc-wrap" style="display:flex;align-items:center;gap:9px;border:1.5px solid #e3d6c1;border-radius:12px;padding:12px 12px;background:#fff;">
            <span class="svc-box"></span>
            <span style="color:#2e9e45;display:inline-flex;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2h8"/><path d="M9 2v3.5L7 8a4 4 0 0 0-1 2.7V20a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-9.3A4 4 0 0 0 17 8l-2-2.5V2"/><path d="M6 13h12"/></svg></span>
            <span style="font-weight:800;font-size:15px;">ウォーターサーバー</span>
          </div>
        </label>
      </div>

      <sc-if value="{{ showError }}" hint-placeholder-val="{{ false }}">
        <div style="margin-top:14px;background:#fdecec;border:1.5px solid #f3c0c0;border-radius:12px;padding:11px 14px;color:#c0392b;font-size:13.5px;font-weight:700;">{{ error }}</div>
      </sc-if>

      <div style="margin-top:16px;background:#eef6e8;border-radius:14px;display:flex;align-items:center;gap:10px;padding:12px 14px;">
        <div style="background:#2a9e46;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex:none;font-weight:900;font-size:15px;">i</div>
        <div style="font-size:13px;color:#3d382f;font-weight:700;line-height:1.5;">入力内容を確認のうえ、担当者よりご連絡します。</div>
      </div>
    </div>

    <button type="submit" style="width:100%;border:none;cursor:pointer;background:transparent;padding:0;margin-top:20px;">
      <div style="background:linear-gradient(180deg,#36a44e,#1c8a39);border-radius:28px;padding:19px 18px;box-shadow:0 8px 0 #0f6e2b,0 16px 24px rgba(20,110,45,.28);display:flex;align-items:center;gap:12px;">
        <div style="width:50px;height:50px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex:none;color:#2a9e46;"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg></div>
        <div style="flex:1;text-align:center;color:#fff;font-weight:900;font-size:24px;letter-spacing:2px;text-shadow:0 2px 3px rgba(0,0,0,.18);">入力内容を送信する</div>
        <div style="width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.16);border:2px solid rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;flex:none;color:#fff;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></div>
      </div>
    </button>

    <div style="text-align:center;margin-top:18px;">
      <div style="font-size:12.5px;color:#7a7263;">個人情報はお問い合わせ対応のために利用します。</div>
      <a href="privacy.html" style="display:inline-flex;align-items:center;gap:4px;color:#1f8a3c;font-weight:800;font-size:13px;margin-top:6px;">プライバシーポリシー<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></a>
    </div>
  </form>
  </sc-if>

</section>
</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  WEBHOOK = 'https://hooks.zapier.com/hooks/catch/12525485/4ukjm5z/';
  state = { submitted: false, error: '', sending: false };
  renderVals() {
    return {
      submitted: this.state.submitted,
      notSubmitted: !this.state.submitted,
      error: this.state.error,
      showError: !!this.state.error,
      onSubmit: (e) => {
        e.preventDefault();
        if (this.state.sending) return;
        const form = e.target;
        const services = [...form.querySelectorAll('input[name=service]:checked')].map(i => i.value);
        if (services.length === 0) {
          this.setState({ error: '興味のあるサービスを1つ以上お選びください。' });
          return;
        }
        const get = (n) => { const el = form.querySelector('input[name="' + n + '"]'); return el ? el.value.trim() : ''; };
        const payload = {
          氏名: get('氏名'),
          電話番号: get('電話番号'),
          メールアドレス: get('メールアドレス'),
          住所: get('住所'),
          興味のあるサービス: services.join('、'),
          送信日時: new Date().toLocaleString('ja-JP'),
          送信元URL: (typeof location !== 'undefined' ? location.href : '')
        };
        this.setState({ sending: true, error: '' });
        fetch(this.WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }).then(() => {
          window.location.href = 'thanks.html';
        }).catch(() => {
          this.setState({ sending: false, error: '送信に失敗しました。通信環境をご確認のうえ、もう一度お試しください。' });
        });
      }
    };
  }
}
</script>
</body>
</html>
